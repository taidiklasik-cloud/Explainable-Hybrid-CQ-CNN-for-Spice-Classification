name: hybrid_qcqcnn_env
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  # Core ML & Deep Learning (with CUDA 11.8 support)
  - pytorch
  - torchvision
  - pytorch-cuda=11.8
  
  # Data Science & EDA
  - pandas>=2.0
  - numpy>=1.24
  - scipy>=1.8
  - scikit-learn>=1.3
  - scikit-image>=0.22
  - matplotlib>=3.7
  - seaborn>=0.13
  - pillow>=10.0
  - statsmodels>=0.14
  
  # Orchestration & PostgreSQL
  - sqlalchemy>=2.0
  - optuna>=4.0
  
  # Utilities
  - jupyter>=1.0
  - ipykernel>=6.0
  - joblib>=1.3
  - tqdm>=4.66
  - numba>=0.59
  - psutil>=5.9
  
  # Pip packages (For specific versions or packages not natively in conda)
  - pip:
    - psycopg[binary]>=3.1
    - psycopg2-binary>=2.9
    - pennylane              # Quantum ML
    - pennylane-lightning    # Fast Quantum Simulator
    - opencv-python>=4.8     # CV tools
    - imagehash>=4.3         # For EDA duplicate detection
    - python-dotenv          # Environment variables

# Catatan: 
# Untuk PC yang tidak memiliki GPU NVIDIA, ubah 'pytorch-cuda=11.8' menjadi 'cpuonly' di bagian dependencies.
